body:
  text: 立命之學余童年喪父老母命棄學舉業解見前舊序中學醫謂可以養生含支持生計保養生命二義可以濟人且習一藝以成名爾父夙心也藝技術賴以生存者也技術而專精即可以成名夙心即素心言久有此心也漢鄧禹佐光武中興功高祿厚以為不足恃有子十三人使各修一藝為天下後世法後余在慈雲寺遇一老者修髯在頤曰鬚在頰曰髯修長也偉貌偉不凡也飄飄若仙瀟灑出塵余敬禮之語余曰子仕路中人也仕路官場也明年即進學科舉時代考取秀才曰進學亦曰入泮何不讀書余告以故並叩老者姓氏里居曰吾姓孔雲南人也得邵子皇極數正傳宋邵雍字堯夫讀書蘇門山共城令李之才奇之授以圖書先天象數之學妙悟神契多所發明研窮世變如觀掌紋有皇極經世書行世是書以易經六十四卦分配元會運世年月日辰以證古今治亂數皆前定謂之皇極數卒年六十七賜諡康節數該傳汝余引之歸告母母曰善待之試其數纖悉皆驗纖悉見前漢食貨志至纖至悉言微細也余遂起讀書之念謀之表兄沈稱言郁海谷先生在沈友夫家開館我送汝寄學甚便余遂禮郁為師孔為余起數縣考童生年未二十曰童子未有功名之考生曰童生雖耆年碩學亦以此名之當十四名府考七十一名提學考第九名提學使即科舉時代之考官亦號學臺一號督學使者明年赴考三處名數皆合復為卜終身休咎休咎猶言吉凶也言某年考第幾名某年當補廩某年當貢廩生貢生皆科舉時代學臺所考生員之程度貢後某年當選四川一大尹尹府縣官名也在任職也三年半即宜告歸五十三歲八月十四日丑時當終於正寢正寢治事之室惜無子余備録一一記出也而謹記之自此以後凡遇考校其名數先後皆不出孔公所懸定者懸定豫定也獨算余食廩米廩生所得之俸也九十一石五斗當出貢廩生出貢廩米止給及食米七十餘石屠宗師即當時之提學使也即批準補貢余竊疑之疑豫定之數卒至不驗也後果為署印署理代行職權之人楊公所駁直至丁卯年殷秋溟宗師見余場中備卷備中之卷歎曰五策策論即五篇奏議也如古名臣因事陳奏條議是非豈可使博洽淹貫之儒老於窗下乎博言見聞廣博也洽言理解融洽也淹言文義透徹也貫言工夫一貫也遂依縣申文准貢連前食米計之實九十一石五斗也余因此益信進退有命遲速有時淡然無求矣貢入燕都北京留京一年終日靜坐不閲文字己巳歸游南雍明南京國子監稱為南雍言其為南京之辟雍也古學制天子所設之大學曰辟雍未入監國學曰國子監創始於晉至清末大學堂立國子監遂廢先訪雲谷會禪師雲谷名法會為當代大善知識慕道往訪傳佛心印不立文字曰禪參究話頭明心見性曰參禪故宏揚宗乘者曰禪師精修戒律者曰律師說法度生宏宣教旨者曰法師於棲霞山中對坐一室凡三晝夜不瞑目雲谷問曰凡人所以不得作聖者只為妄念相纏耳汝坐三日不見起一妄念何也余曰吾為孔先生算定榮辱死生皆有定數即要妄想亦無可妄想雲谷笑曰我待汝是豪傑原來只是凡夫問其故曰人未能無心終為陰陽即氣數也所縛安得無數但惟凡人有數極善之人數固拘他不定極惡人之數亦拘他不定汝二十年來被他算定不會轉動一毫豈非是凡夫余問曰然則數可逃乎曰命由我作福自己求詩書所稱的的確也為明訓我教典中說求富貴得富貴求男女得男女求長壽得長壽夫妄語乃釋迦大戒諸佛菩薩豈誑語欺人余進曰孟子言求則得之是求在我者也道德仁義可以力求功名富貴如何求得雲谷曰孟子之言不錯汝自錯解了汝不見六祖說六祖慧能傳達摩衣鉢之第六人有壇經行世一切福田不離方寸指心地也從心而覓感無不通求在我不獨得道德仁義亦得功名富貴內外雙得是求有益於得也若不返躬內省而徒向外馳求則求之有道而得之有命矣內外雙失故無益因問更欲有所開發接口再問也孔公算汝終身若何余以實告此省筆法一語代却多語雲谷曰汝自揣揣度量也人不可無此自知之明應得科第否應生子否余追省良久人人俱備如來智慧德性一念縱橫照去凡過去未來十方國土一一現前惜為種種情封欲閉失却本明如鏡蒙塵如鐵生鏽耳曰不應也老實乃進德之基凡飾非掩過之人前途有何希望科第中人類有福相余福薄又不能積功纍行以基厚培也厚福福固有相但相隨心變此陰功善行之所以貴乎積纍也兼不耐煩劇不能容人性情褊急度量淺狹實為福薄之相時或以才智蓋人自以為才智過人便是短處安能再有進步直心直行心無私曲之謂直直心是為聖為賢之美德此直心當作縱情或任性解則直行當作徑行解輕言妄談凡此皆薄福之相也豈宜科第哉人苦不自知己短耳知之則必思所以救之此認罪者之所以終於無罪也地之穢者多生物水之清者常無魚余好潔宜無子者一和氣能育萬物余善怒宜無子者二愛為生生之本忍為不育之根余矜惜名節常不能舍己救人宜無子者三多言耗氣宜無子者四喜飲鑠精宜無子者五好徹夜長坐而不知葆元育神宜無子者六好潔亦美德潔而成癖則寡情此為無子之一因怒招人怨易敗事易失人心此福薄相亦可為無子之一因愛者仁愛不作情愛解愛即為仁仁如果核之仁種之即出忍則無慈無慈則無愛如無仁則無生機堅忍是入聖美德此處作殘刻解忍字從刃從心為心境殘刻之表示此亦無子之一因矜惜名節偏於自好此亦無子之一因既驕且吝不能種德此亦無子之一因多言耗氣喜飲則鑠精鑠消失也此不壽之徵縱令得子亦多夭折不數傳後或至絶嗣此亦無子之一因大修養人私欲淨盡心境空明更無陰氣足以覆蓋常在定中智光湛然永斷睡相此聖境也欲以凡俗而遽冀此戕害生機實所不免此為致病致弱之因不僅艱於得子已也其餘過惡尚多不能悉數雲谷曰豈惟科第哉世間享千金之産者定是千金人物享百金之産者定是百金人物應餓死者定是餓死人物天不過因材而篤幾曾加纖毫意思栽者培之傾者覆之同一境界同一時機生者自生滅者自滅成敗得失千差萬別其實種種境界都從心地上造出先哲知之認為自取世俗昧之諉諸氣數所以鮮知自拔也即如生子有百世之德者定有百世子孫保之有十世之德者定有十世子孫保之有三世二世之德者定有三世二世子孫保之其斬焉無後者德至薄也此方便說法語世俗恆情以無後為可恥之事雲谷借此意以作警惕勵了凡努力修德耳出世聖賢以絶欲斷愛為去惑轉智超凡入聖第一功修惜俗情未及了解耳汝今既知非將向來不發科第及不生子之相盡情改刷各人有各人之病痛既能平心自檢尋出一一病痛一一過失所在便有下手處用全神全力反轉來慳貪者轉之以施捨憤激者轉之以和平虛夸者轉之以切實浮囂者轉之以沈定驕慢者轉之以謙恭惰逸者轉之以勤奮殘忍者轉之以仁慈怯退者轉之以勇進務要積德務要包荒務要和愛務要惜精神以上數者是了凡對證之藥吾人可各就特異之心病變通藥之從前種種譬如昨日死從後種種譬如今日生此義理再生之身也此至人造命訣也改造命運第一步工夫便是痛改前非一一積習悉皆掃除一一病根悉皆拔去時時處處常自警覺嚴自克治保善天真如保赤子改造命運全權在己不屬造化即上文所謂極善之人數固拘他不定是也夫血肉之身尚然有數數定數也義理之身豈不能格天精誠所至金石為裂此至誠所以格天也太甲商之賢君初頗失德曰感謝伊尹語天作孽猶可違自作孽不可活違作避免或挽回解活作生存解詩云永言恆言也配命上合天心也自求多福此千古不磨之金言孔先生算汝不登科第不生子者此天作之孽猶可得而違汝今擴充德性力行善事多積陰德作善於人所不知不覺之地謂之陰德獲福甚大若能併作善之念獲福之念而忘之則作善之心益真而善量愈不可以測量焉非天下之大德其孰能與於斯此自己所作之福也安得而不受享乎易易經多戒謹恐懼之言所言非臆造純從六十四卦三百八十四爻剛柔變化盈虛消息中來亦天然之因果律也為君子謀趨吉避凶若言天命有常有常乃衆生妄想試平心觀察無論何事何物有那一件站得住腳跟但見一一無常而已吉何可趨凶何可避因為諸行無常所以一切得失苦樂境界都覺得非常活變可以隨著各人行為把他加減乘除去來開章第一義便說積善之家必有餘慶語見周易坤卦文言汝信得及否余信其言拜而受教聞善言而生疑謗者是為罪惡之相故曰疑為罪根聞善言而起敬信者是為福德之相故曰信為福母因將往日之罪佛前盡情發露為疏一通朱子家訓有云惡恐人知便是大惡可知回護掩飾便是罪業之相涅槃經云有二白法能救衆生一慚二愧慚者內自羞恥愧者愧作於人懺悔舊時所犯身口意諸不善業便開改過自新之路成翻染為淨之行或向長者前懺悔或向法師前懺悔或向佛座前懺悔疏敘述行狀之文也先求登科誓行善事三千條以報天地祖宗之德雲谷出功過格示余令所行之事逐日登記善則記數惡則退除功過格中所定功過數目為修省定則參照凡例十六條中所指示處於定則上尚有加減乘除稱量登記之作用義益圓滿且教持準提咒咒乃斬除一切揣摩情想降伏千魔百邪之不思議法門佛母準提陀羅尼為過去七俱胝准提如來所說俱胝為千萬億大數佛母以諸佛從此法門産出故得此名陀羅尼乃萬行總持之義咒曰南無颯多喃三藐三勃馱俱胝喃怛姪他唵折隸主隸準提莎婆二合訶持誦功德不可稱量詳準提陀羅尼經以期必驗語余曰符籙家有云不會書符被鬼神笑此有祕傳只是不動念也執筆書符先把萬緣放下一塵不起把心地打掃得乾乾淨淨從此念頭不動處下一點謂之混沌開基混沌元氣未判之謂由此而一筆揮成更無思慮此符便靈凡祈天立命祈禱告也都要從無思無慮處感格感格言感通也孟子論立命之學而曰夭壽不二短命曰夭夫夭與壽至二者也當其不動念時孰為夭孰為壽細分之豐歉不二然後可立貧富之命窮通不二然後可立貴賤之命夭壽不二然後可立生死之命人生世間惟死生為重夭壽則一切順逆皆該之矣至修身以俟之乃積德祈天之事曰修則身有過惡皆當治而去之曰俟則一毫覬覦音冀俞希望也一毫將迎逐物曰將豫計曰迎皆當斬絶之矣斷除覬覦將迎之意到此地位直造先天之境造到也返本還源顯出本來面目也即此便是實學汝未能無心但能持準提咒無記無數不令間斷持如持物不釋手然言精勤持誦也得純熟於持中不持於不持中持到得念頭不動則靈驗矣余初號學海是日改號了凡蓋悟立命之說而不欲落凡夫窠臼也窠臼言襲常蹈故也從此而後終日兢兢兢兢戒懼之狀便覺與前不同前日只是悠悠放任隨隨便便無拘無束也到此自有戰兢惕厲景象戰戰兢兢如臨深淵如履薄冰內存畏敬之心曰惕外對嚴肅之威曰厲在暗室屋漏中獨居無侶人目所不見處常恐得罪天地鬼神遇人憎我毀我厭惡曰憎造謗曰毀自能恬然容受恬音甜安然也容受承受不較也到明年禮部考科舉禮部舊官制六部之一掌禮教及學校貢舉之法猶今之教育部也孔先生算該第三該應當也忽考第一其言不驗而秋闈中式矣科舉時代生員考舉人之鄉試時在仲秋闈考場也牆緣棘防弊亦名棘闈中式考取也然行義未純未純言雜而不純勉強而未自然也檢身多誤檢檢點也誤過誤也或見善而行之不勇或救人而心常自疑或身勉為善而口有過言或醒時操持而醉後放逸以過折功日常虛度自己巳歲發願直至己卯歲歷十餘年而三千善行始完時方從李漸庵入關未及回向回回轉向趨向回己所修之功德有所趨向曰回向凡一切善行皆可回向或以之贖罪或以之報恩或以之普施法界衆生均可至誠祝願以植勝因庚辰南還始請性空慧空諸上人上人高僧美稱就東塔禪堂回向遂起求子願亦許行三千善事辛巳生汝天啓余行一事隨以筆記汝母不能書每行一事輒即也用鵝毛管印一硃圈於曆日之上曆日即家家所備之曆本或施食貧人或買放生命一日有多至十餘圈者至癸未八月三千之數已滿復請性空輩就家庭回向九月十三日復起求進士願許行善事一萬條丙戌登第授寶坻知縣寶坻京兆縣名余置空格一冊名曰治心編此空格治心編應人人置備倣行人人可以覓出平地登雲之路晨起坐堂家人攜付門役置案上所行善惡纖悉必記夜則設桌於庭庭堂中階前也效趙閲道焚香告帝解見前序文中汝母見所行不多輒顰蹙愁容也曰我前在家相助為善故三千之數得完今許一萬衙中無事可行何時得圓滿乎圓圓成滿滿足夜間偶夢見一神人余言善事難完之故神曰只減糧一節萬行俱完矣蓋寶坻之田每畝二分三釐七毫余為區處計畫也減至一分四釐六毫委有此事委實屬也心頗驚疑驚一念之微已為神明所知疑僅一善行如何便抵萬善適恰巧也幻余禪師自五臺來五臺山名在山西五臺縣東北五峯聳立高出雲表山上無林木如壘土之臺故名華嚴名為清涼山今屬山西雁門道袁公夙因深植與當代出世聖賢有緣方便指引助成勝業福薄之輩緣慳不遇內典博載障重衆生多生多劫不聞佛名僧為上宏下化人中至寶佛法藉以宣傳苦海因而得度得遇聖賢僧宿福之厚可知余以夢告之且問此事宜信否師曰善心真切即一行可當萬善况合縣減糧萬民受福乎吾即捐俸銀請其就五臺山齊僧一萬而回向之一即字足見其人當機立斷慷慨布施無絲毫牽強吝情處宜其受福無量也孔公算豫五十三歲有厄厄災難也余未嘗祈壽是歲竟無恙恙憂也病也今六十九矣書曰天難諶命靡常文見商書咸有一德篇諶音申信也靡不也言天道難信以其命之不常也故曰禍福無不自己求之者又云惟命不於常文見周書康誥篇亦言天命無常修德為要皆非誑語非欺人語也吾於是而知凡稱禍福自己求之者乃聖賢之言若謂禍福惟天所命則世俗之論矣汝之命未知若何即命當榮顯常作落寞想即時當順利常作拂逆想即眼前足食常作貧窶想即人相愛敬常作恐懼想即家世望重常作卑下想即學問頗優常作淺陋想落寞不遇時也拂逆不稱懷也窶音矩貧無禮室也望重衆望所歸也此六想皆從現前境界反面看去如此行持自然克己復禮虛靈不昧可以入道可以進德此空前之庭訓也遠思揚祖宗之德近思蓋父母之愆蓋遮掩也愆過誤也上思報國之恩下思造家之福外思濟人之急內思間己之邪急急難濟救援邪邪念間防制務要日日知非日日改過一日不知非即一日安於自是一日無過可改即一日無步可進天下聰明俊秀不少所以德不加修業不加廣者只為因循二字耽閣一生因循苟且偷安也耽閣阻止進步也雲谷禪師所授立命之說乃至精至邃邃音粹深遠也至真至正之理其熟玩而勉行之自曠也玩作珍愛研學解曠將光陰空過意毋禁止辭言不許也改過之法春秋魯史名記衰周列國大事諸大夫見人言動億以意揣度而談其禍福靡同無不驗者左左傳國國語諸記可觀也大都吉凶之兆萌芽也乎心而動乎四體其過於厚者常獲福過於薄者常近禍俗眼多翳遮障也謂有未定而不可測測度者至誠合天福之將至觀其善而必先知之矣禍之將至觀其不善而必先知之矣今欲獲福而遠禍未論行善先須改過但改過者第一要發恥心思古之聖賢與我同為丈夫彼何以百世可師我何以一身瓦裂如瓦墜地而碎裂言結果惡劣也耽染耽甘願染受污塵情塵聲色貨利等一切外誘情喜怒哀樂等一切內惑私行不義謂人不知傲然無愧將日淪於禽獸而不自知矣淪沈溺也世之可羞可恥者莫大乎此孟子曰恥之於人大矣以其得之則聖賢知恥則勇於改過而德業日新失之則禽獸耳無恥則肆意妄行而人格消失此改過之要機也第二要發畏心天天帝地地神在上鬼神難欺吾雖過在隱微而天地鬼神實鑒臨之重則降之百殃輕則損其現福吾何可以不懼不惟獨也是也閒居指私室也之地指視昭然雖在私室中亦如有十目監視著十手指點著十乃多數慎勿泥解吾雖掩之甚密文飾也之甚巧而肺肝早露終難自欺被人覷破暗裏看破也不值一文矣烏義同何得不懍懍含畏敬危懼意不惟是也一息一呼一吸為一息尚存彌天之惡遍滿曰彌猶可悔改放下屠刀立地成佛苟有悔罪之心便開自新之路古人有一生作惡臨死悔悟發一善念遂即也得善終者修不嫌早悔不嫌遲臨終安詳超拔之徵謂一念猛厲多少修士敗於悠悠忽忽之中苟發心痛切進修猛厲雖罪積如山亦得解救可不知所勉哉足以滌洗除淨盡百年之惡也譬如千年幽黑暗而進深也谷一燈才照則千年之暗俱除故過不論久近惟以改為貴但塵世無常肉身易殞落地也歿也一息一呼吸也不屬一氣離身不為己有也欲改無由矣一切攜不去惟有孽隨身明則千百年擔負惡名雖孝子慈孫不能洗滌幽則千百劫沈淪獄報諸想輕舉情欲沈淪純想即飛純情即沈升沈因由具詳楞嚴第八卷文長不備引雖聖賢佛菩薩不能援引烏得不畏代行己不到代食己不飽欲求超拔惟恃自力諸天方在快樂障中修羅方在煩惱障中欲求解脫亦頗不易其至不幸而沈淪三惡道中無數衆生類皆神識昏迷益少自拔機會其最易醒覺最便修持者惟有人道但生老病死息息遷謝百年之久轉瞬即去此身一失千生百劫永為夙罪所驅不知經何長劫夙罪消盡再得人身清夜自思能不懍然汗下急作自拔之圖哉第三須發勇心人不改過多是因循得過且過毫不振作也退縮退後不前也吾須奮然含勇往振作意振作不用遲疑不煩等待小者如芒刺在肉速與抉剔拔去也大者如毒蛇嚙嚙同咬毒蛇咬指不斬指則身必死指速與斬除無絲毫十忽曰絲十絲曰毫十毫曰釐絲毫微小之數也凝滯遲疑不決之意此風雷之所以為益也風雷益為周易卦名言風行雷厲直捷痛快容易成功也具是三心指上文恥心畏心勇心則有過斯改如春冰遇日何患不消乎然人之過有從事上改者有從理上改者有從心上改者發恥畏勇三心為改過之因示事理心三路詳改過之法工夫不同效驗亦異如前日殺生今戒不殺前日怒詈音利正斥曰罵旁及曰詈以惡言侵犯也今戒不怒此就其事而改之者也強制於外其難百倍且病根終在東滅西生非究竟廓然拔除一空之謂之道也善改過者未禁其事先明其理如過在殺生即思曰上帝好生物皆戀命貪生怕死物物皆然殺彼養己豈能自安且彼之殺也既受屠割復入鼎鑊種種痛苦徹入骨髓徹透達也己之養也珍貴品膏厚味羅列陳列滿前食過即空乍過三寸舌誰更辨鹹酸貪饞造殺業報復足心寒疏食菜羹儘可充腹何必戕傷害彼之生損己之福哉又思血氣之屬皆含靈知即靈性也既有靈知皆我一體縱即使不能躬修至德使之尊我親我豈可日戕物命使之仇我憾我於無窮也一思及此將有對食傷心不能下咽者矣如前日好怒必思曰人有不及人各有不到之處豈可苛為刻責情所宜矜矜憐憫也悖理相干悖逆也干犯也於我何與與關係也本無可怒者又思天下無自是之豪傑大勇若怯大智若愚自暴所長適形淺陋亦無尤人之學問尤怨也尤人怨恨於人人無涵養所以出此惟有大學問人有大涵養善於克己止見自己工夫之未到感化之未深淺人則反是行有不得皆己之德未修感未至也吾悉以自反人無禮於我恐我之尚有失禮於人處人不忠於我恐我之尚有未忠於人處如此一一自檢自責自策之不暇尚何敢輕於責人以重己之罪哉則謗毀之來皆磨煉玉成之地我將歡然受賜何怒之有又聞謗而不怒雖讒焰薰天如舉火焚空終將自息滅也止也聞謗而怒雖巧心力辨如春蠶作繭自取纏綿自縛也怒不惟無益且有害也其餘種種過惡皆當據理思之此行文該括法此理既明過將自止何謂從心而改過有千端惟心所造一切惟心造吾心不動過安從生一切惟心滅學者於好色好名好貨好怒此好字去聲作嗜好解有貪得意輕舉妄動意種種諸過不必逐類尋求但當一心為善正念不提正念空過春秋離却一切邪念一切差別念止念無念也現前邪念自然污染不上念起是病不續是藥時刻觀照邪機止息如太陽當空魍魎潛消木石之怪曰魍魎又水怪亦曰魍魎始則潛伏不敢出現繼則直至消滅無蹤此精一之真傳也精精密一純一執中守正此攝心之法也過由心造亦由心改如斬毒樹直斷其根奚同何必枝枝而伐葉葉而摘哉大抵最上治心當下立見也清淨才動即覺覺之即無苟未能然須明理以遣之遣發派也不待直攻惟事遣散又又設或也未能然須隨事以禁之取斷然之處置遣乃釜底抽薪法禁則直捷制止法以上事而兼行下功未為失策執下而昧上則拙矣顧但也發願改過明須良朋提醒幽須鬼神證明如遇雲谷幻余為之指示以決趨向又如為疏通告發露己罪力圖自新一心懺悔伏罪自新之謂晝夜不懈至誠無息勇猛精進是修持成功不二訣經一七七天二七十四天以至一月二月三月必有效驗或覺心神恬曠恬安適曠開展或覺智慧頓開或處冗沓而觸念皆通冗沓事務冗細重沓也或遇怨仇而回瞋作喜此大福德大智慧相或夢吐黑物或夢往聖先賢提攜接引或夢飛步太虛或夢幢幡寶蓋種種勝事勝稀有也皆過消罪滅之象也然不得執此自高畫而不進畫言截斷進程也昔蘧伯玉當二十歲時已覺前日之非而盡改之矣至二十一歲乃知前之所改未盡也及二十二歲回視二十一歲猶在夢中歲復一歲遞遞更迭也改之行年五十而猶知四十九年之非古人改過之學如此解見第一篇序文中今不再贅吾輩身為凡流過惡蝟集蝟身有叢刺其大如兔其狀如鼠性𤢆鈍物少犯近則毛刺攢起如矢蝟集喻叢集也而回思往事常若不見其有過者心粗而眼翳也然人之過惡深重者亦有效驗有證據可查考也或心神昏塞轉頭即忘或無事而常煩惱或見君子而赧然懷慚而面赤消沮精神頽喪也或聞正論而不樂或施惠而人反怨或夜夢顛倒甚則妄言失志皆作孽之相也苟一類此即須奮發舍舊圖新幸勿自誤積善之方易曰積善之家必有餘慶昔顏氏將以女妻去聲配也叔梁紇孔子之父而歷敘其祖宗積德之長逆知豫知其子孫必有興者孔子稱舜之大孝曰宗廟古天子諸候祭祀先人之所也廟者貌也因此想像先人之容貌也饗之受享也子孫保之皆至論也試以往事徵之考驗也楊少師榮古皇帝之師舊制有太師太傅太保少師少傅少保之職其尊介於公卿之間建寧府名屬福建省人世以濟渡為生其先祖纍世操渡船生涯久雨溪漲橫流水急勢猛而橫流也衝毀民居溺死者順流而下他舟皆撈取貨物獨少師曾祖及祖惟救人而貨物一無所取鄉人嗤其愚嗤竊笑也逮及也少師父生家漸裕家計寬裕有神人化為道者語之曰汝祖父有陰功子孫當貴顯宜葬某地遂依其所指而窆之窆音砭安葬也即今白免墳也後生少師弱冠登第位至三公加曾祖祖父如其官子孫貴盛至今尚多賢者鄞縣名屬寧波府人楊自懲初為縣吏佐理之職存心仁厚守法公平時縣宰長官嚴肅偶撻打也一囚囚犯血流滿前而怒猶未息楊跪而寬解之宰曰怎奈此人越法悖理越踰越悖悖逆不由人不怒自懲叩首曰上失其道民散久矣散失所依從也如得其情哀矜哀傷痛矜憐憫勿喜喜且不可而况怒乎喜則易涉輕忽怒則更多冤抑宰為之霽顏心被感動而息怒也家甚貧餽遺一無所取遇囚人乏糧常多方以濟之濟解人之急也一日有新囚數人待哺飢極期得食如赤子待哺也家又缺米給囚則家人無食自顧則囚人堪憫與其婦商之婦曰囚從何來曰自杭而來沿路忍饑菜色可掬言饑者面黃於菜可與掌中之黃色菜葉相比也因撤除去己之米煮粥以食去聲讀如飼給彼充饑也囚後生二子長曰守陳次曰守址為南北吏部侍郎長孫為刑部侍郎次孫為四川廉憲官名元置肅政廉訪司以巡察各路明改為提刑按察使司故稱按察使為廉訪亦曰廉憲又俱為名臣今楚亭德政亦其裔後人也昔正統間明英宗年號鄧茂七倡亂於福建士民從賊者甚衆朝廷起鄞縣張都憲楷南征以計擒賊後委委派布政司管理全省財政民政猶今之省長也謝都事搜殺東路賊黨謝求賊中黨附冊籍凡不附賊者密授以白布小旗約兵至日插旗門首戒軍兵無妄殺全活萬人後謝之子遷中狀元為宰輔宰相也孫丕復中探花科舉時代殿試第三名曰探花莆田屬福建廈門道林氏先世有老母好善歡喜行善常作粉團施人求取即與之無倦色一仙化為道人每旦索食六七團母日日與之終三年如一日乃知其誠也因謂之曰吾食汝三年粉團何以報汝府後有一地葬之子孫官爵有一升麻子之數其子依所點葬之初世即有九人登第纍代簪纓甚盛代世多貴顯之人福建有無林不開榜之謠一鄉盛傳之說馮琢庵太史國史館事多以翰林任之故翰林號曰太史之父為邑庠生秀士也隆冬早起赴學路遇一人倒臥雪中捫之以手撫之半殭矣幾乎氣絶也遂解己綿裘衣之為之穿著也且扶歸救蘇生機回轉也夢神告之曰汝救人一命出至誠心吾遣韓琦即宋名臣韓魏公也其簡史已詳舊序中為汝子及生琢庵遂名琦台州應尚書壯年習業於山中夜鬼嘯集往往驚人公不懼也一夕聞鬼云某婦以夫久客不歸翁姑逼其嫁人明夜當縊上弔也死於此吾得代矣公潛毫不聲張賣田得銀四兩即僞作其夫之書寄銀還家其父母見書以手跡不類疑之既而曰書可假銀不可假想兒無恙婦遂不嫁其子後歸夫婦相保如初公又聞鬼語曰我當得代奈此秀才壞吾事傍一鬼曰爾何不禍之此之字作他字解曰上帝以此人心好命作陰德尚書矣舊官制六部之長皆稱尚書吾何得而禍之應公因此益自努勵善日加修德日加厚遇歲饑輒每也捐穀以賑救濟之遇親戚有急輒委曲維持遇有橫逆非理之侵犯輒反躬自責反回轉也怡然心平氣和順受大度包容子孫登科第者今纍纍也甚多常熟蘇屬縣名徐鳳竹栻其父素富偶遇年荒先捐租以為同邑之倡又分穀以賑貧乏夜聞鬼唱於門曰千不誆誆欺人語也萬不誆徐家秀才做到了舉人郎相續而呼連夜不斷是歲鳳竹果舉於鄉舉舉人鄉鄉試其父因而益積德孳孳勤勉不怠修橋修路齊僧僧為人中福田有僧而後佛法住世遇佛法而後衆生有出苦之期凡發至心齊僧者此人當來受福無量謗法謗僧以惡知見導衆造罪業此人當下即得無邊罪業罪福皆由人自造也接衆接待行腳僧衆俾得歇息住宿凡有利益無不盡心後又聞鬼唱於門曰千不誆萬不誆徐家舉人直做到都堂都堂官廳之稱亦為舊官制都察院堂上官長之稱鳳竹官終兩浙巡撫嘉興屠康僖公初為刑部主事宿獄中細詢諸囚情狀得無辜音姑罪也者若干人公不自以為功密疏其事以白堂官後朝審堂官摘其語約舉屠公所白語以訊審問諸囚無不服者釋冤抑冤枉屈抑壓迫十餘人一時輦下咸頌尚書之明輦下指京都咸頌口碑載道也公復稟曰輦轂之下輦轂指車駕經行之地言切近也尚多冤民四海之廣兆民之衆豈無枉者宜五年差一減刑官核實仔細考查究其實情而平反之輕重酌中曰平盡翻舊案曰反尚書為奏允其議時公亦差減刑之列夢一神告之曰汝命無子今減刑之議深合天心上帝賜汝三子皆衣紫腰金是夕夫人有娠受孕後生應塤應坤應埈皆顯官嘉興包憑字信之其父為池陽太守池陽即安徽池州府別名太守為舊官制郡守亦名知府生七子憑最少贅平湖袁氏與吾父往來甚厚博學高才纍舉不第留心二氏佛老之學一日東游泖湖在江蘇松江府有上泖中泖下泖稱為三泖西承太湖來源東注吳淞江入海偶至一村寺中見觀音像淋漓露立屋破無物禦雨點也即解橐有托底之袋曰橐無托底而縫合者曰囊中得十金授主僧令修屋宇僧告以功大銀少不能竣音俊完結也事復取松布四匹檢篋中衣篋竹箱七件與之內紵褶紵麻織物也精者曰絺粗者曰綌褶夾衣也係新置其僕請已之已罷而不與也憑曰但得聖像無恙吾雖裸裎何傷裸裎露體也僧垂淚曰舍銀及衣布猶非難事只此一點心如何易得後功完拉老父同遊宿寺中公夢伽藍佛寺中護法神有十八位載七佛經來謝曰汝子當享世祿矣後子汴孫柳芳皆登第作顯官嘉善縣名屬浙江嘉興府支立之父為刑房吏有囚無辜無罪陷被害重辟重刑意哀之欲求其生囚語其妻曰支公嘉意愧無以報明日延之下鄉汝以身事之彼或肯用意則我可生也其妻泣而聽命及至妻自出勸酒具告以夫意支不聽卒到底為盡力平反之囚出獄夫妻登門叩謝曰公如此厚德晚世所稀今無子吾有弱女送為箕帚妾此則禮之可通者支為備禮而納之生立弱冠年二十也中魁官至翰林孔目官名掌翰林院文牘之類立生高高生祿皆貢為學博祿生大綸登第凡此十條所行不同同歸於善而已若復精而言之則善有真有假有端有曲有陰有陽有是有非有偏有正有半有滿有大有小有難有易皆當深辨為善而不窮理則自謂行持豈知造孽枉費苦心無益也何謂真假昔有儒生數輩謁中峯和尚元天目山高僧普應國師問曰佛氏論善惡報應如影隨形今某人善而子孫不興某人惡而家門隆盛佛說無稽矣稽考也無稽無可考證也中峯云凡情俗情未滌滌洗濯也正眼法眼未開認善為惡指惡為善往往有之不憾己之是非顛倒而反怨天之報應有差乎衆曰善惡何致相反中峯令試言其狀一人謂詈人罵人毆人打人是惡敬人禮人是善中峯云未必然也一人謂貪財妄取是惡廉潔有守是善中峯云未必然也衆人歷言其狀中峯皆謂不然因請問中峯告之曰有益於人是善有益於己是惡有益於人則毆人詈人皆善也有益於己則敬人禮人皆惡也是故人之行善利人者公公則為真利己者私私則為假又根心從良心發出者者真襲跡循例者假又無為為去聲謂無所希求也而為者真有為有所希求而為者假皆當自考何謂端曲今人見謹願恭順之士類稱為善而取之聖人則寧取狂勇於進取不拘小節狷堅於退守不肯輕舉至於謹願之士雖一鄉皆好而必以為德之賊賊傷害也是世人之善惡分明與聖人相反推此一端種種取舍無有不謬天地鬼神之福善禍淫皆與聖人同是非而不與世俗同取舍凡欲積善決不可徇耳目被聲色役使也惟從心源隱微處即無人能見之念頭方動處默默洗滌嚴自糾察善自防止純完全是濟世之心則為端苟有一毫媚世之心即為曲純是愛人之心則為端有一毫憤世之心即為曲純是敬人之心則為端有一毫玩世之心即為曲侮弄曰玩皆當細辨何謂陰陽凡為善而人知之則為陽善為善而人不知則為陰德陰德天報之陽善享世名名亦福也名者造物所忌世之享盛名而實不副副相配也者多有奇非常禍人之無過咎罪狀而橫被惡名者子孫往往驟發能逆來順受如此涵養一生所作善業烏有限量其子孫之發跡有必然者陰陽之際微矣哉何謂是非魯國之法魯人有贖人臣妾於諸侯皆受金於府府掌財幣之官臣家臣奴僕類妾侍妾婢女類均坐罪而沒入官家者法有納金贖罪之例子貢孔子弟子長於理財贖人而不受金孔子聞而惡之曰賜子貢名失之矣夫聖人舉事可以移風易俗而教道可施於百姓非獨適己求快己心之行也今魯國富者寡而貧者衆受金則為不廉何以相贖乎自今以後不復贖人於諸侯矣此蓋魯國恤民之道謂魯國之人或在他國有錮蔽不能自由者若有好義之士為之納金請令自由魯之政府則賞以金子貢善於理財家資甚富贖人而不受賞金其心頗善而未免有妨後人以受金則為不廉若非大富人誰有此力故孔子說此以防其弊子路孔子弟子精通武藝拯人於溺溺失足落水也拯救援也其人謝之以牛子路受之孔子喜曰自今魯國多拯人於溺矣一則勇於救難一則厚於報德皆足以為世勸自俗眼觀之子貢不受金為優子路之受牛為劣劣可鄙薄也孔子則取由子路名而黜責也賜子貢名焉乃知人之為善不論現行求快一時而論流弊流毒後世不論一時而論久遠不論一身而論天下現行雖善而其流足以害人則似善而實非也現行雖不善而其流足以濟人則非善而實是也然此就一節論之耳他如非義之義非禮之禮非信之信非慈之慈皆當決擇何謂偏正昔呂文懿公初辭相位歸故里海內仰之如泰山北斗有一鄉人醉而詈之呂公不動謂其僕曰醉者勿與較也閉門謝之逾年過了一年其人犯死刑入獄呂公始悔之曰使當時稍與計較送公家官署責治懲戒可以小懲而大戒吾當時只欲存心於厚不謂養成其惡以至於此此以善心而行惡事者也又有以惡心而行善事者如某家大富值歲荒窮民白晝搶粟於市告之縣縣不理窮民愈肆遂私執捕捉而困辱之衆始定不然幾近也亂矣故善者為正惡者為偏人皆知之其以善心而行惡事者正中偏也以惡心而行善事者偏中正也不可不知也何謂半滿易曰善不積不足以成名惡不積不足以滅身書曰商罪貫盈惡貫滿盈喻如錢盈串也如貯儲藏物於器勤而積之則滿懈而不積則不滿此一說也昔有某氏女入寺欲施而無財止有錢二文捐而與之主席者親為懺悔及後入宮富貴攜數千金入寺捨之主僧惟令其徒回向而已因問曰吾前施錢二文師親為懺悔今施數千金而師不回向何也曰前者物雖薄而施心甚真非老僧親懺不足報德今物雖厚而施心不若前日之切令人代懺足矣此千金為半而二文為滿也鍾離授丹於呂祖呂祖唐時人名巖字洞賓喜作出世裝束咸通中及第兩調縣令途遇異人鍾離權授以修養方法遂隱陝西終南山得道點鐵為金可以濟世呂問曰終變否曰五百年後當復本質呂曰如此則害五百年後人矣吾不願為也曰修仙要積三千功行汝此一言三千功行已滿矣呂發此言從不圖現益普益未來之真心中出故其功行彌大此又一說也又為善而心不著善則隨所成就皆得圓滿心著於善雖終身勤勵止於半善而已譬如以財濟人內不見己外不見人中不見所施之物是謂三輪體空是謂一心清淨則斗粟可以種無涯之福一文可以消千劫之罪倘此心未忘雖黃金萬鎰鎰二十兩福不滿也此又一說也何謂大小昔衛仲達為館職被攝至冥司攝攝魂冥陰也主者冥官命吏呈善惡二録比及也至則惡録盈庭其善録一軸僅如筯音住夾取食物之器而已索稱稱之則盈庭者反輕而如筯者反重仲達曰某年未四十安得過惡如是多乎曰一念不正即是不待犯也因問軸中所書何事曰朝廷嘗興大工修三山石橋君上疏諫之此疏稿也仲達曰某雖言朝廷不從於事無補救也而能有如是之力曰朝廷雖不從君之一念已在萬民向使聽從善力更大矣故志在天下國家則善雖少而大苟在一身雖多亦小何謂難易先儒謂克己須從難克處克將去夫子論為仁亦曰先難必如江西舒翁捨二年僅得之束修代償官銀而全人夫婦與邯鄲屬河南彰德府張翁捨十年所積之錢代完贖銀而活人妻子皆所謂難捨處能捨也如鎮江府治屬江蘇靳翁雖年老無子不忍以幼女為妾而還之鄰此難忍處能忍也故天降之福亦厚凡有財有勢者其立德皆易易而不為是為自暴貧賤作福皆難難而能為斯可貴耳隨緣濟衆其類至繁約言其綱大約有十第一與人為善第二愛敬存心第三成人之美第四勸人為善第五救人危急第六興建大利第七捨財作福第八護持正法第九敬重尊長第十愛惜物命何謂與人為善昔舜在雷澤在山東濮縣東南見漁者皆取深潭厚澤而老弱則漁於急流淺灘之中惻然悲痛哀之往而漁焉投足彼輩中欲以身作則見爭者皆匿其過而不談為人掩惡去其反抗之心留彼自新之路見有讓者則揄揚稱許讚揚以作激勸而取法之朞年周年皆以深潭厚澤相讓矣此不過借此故事表出與人為善之德意並非勸人捕魚而造謀財害命之殺業也凡一切殺生行業及一切與殺生業有連帶關係之行業皆屬黑業皆為千生百劫沈淪苦海之深因擇業不可不審慎也夫以舜之明哲豈不能出一言教衆人哉乃不以言教而以身轉之轉移人心此良工苦心也吾輩處末世勿以己之長而蓋人勿以己之善而形人勿以己之多能而困人收斂才智若無若虛見人過失且涵容而掩覆之一則令其可改一則令其有所顧忌而不敢縱放肆見人有微長可取小善可録記録期不負其善行也翻然舍己而從之且為豔稱而廣述之凡日用間發一言行一事全不為自己起念全是為物立則此大人天下為公之度也何謂愛敬存心君子與小人就形迹觀常易相混惟一點存心處則善惡懸絶判然如黑白之相反故曰君子所以異於人者以其存心也君子所存之心只是愛人敬人之心蓋人有親疏貴賤有智愚賢不肖萬品不齊皆吾同胞皆吾一體孰非當敬愛者愛敬衆人即是愛敬聖賢能通衆人之志即是通聖賢之志何者聖賢之志本欲斯世斯人各得其所吾合愛合普遍也合敬而安一世之人即是為代也聖賢而安之也何謂成人之美玉之在石抵擲抵拒敵對而拋擲之則瓦礫等於碎瓦石子追琢追音堆追琢治玉功程也則圭璋圭瑞玉上圜下方古之王者作為國家名器以封諸侯故取重土如夏禹治水功成而錫玄圭璋說文半圭為璋故凡見人行一善事或其人志可取而資可進皆須誘掖誘善導掖提扶而成就之或為之獎借獎褒美勸勉意借善善從長含寬待意或為之維持或為白其誣污衊也冤枉也而分其謗獎借維持辨誣分謗能如此成全人便是大學問大智慧大福德相務使之成立而後已大抵大概也人各惡去聲不喜歡也其非類宗旨性習或各別或相反也衆生肉眼不識好歹同惡相濟臭味相投者誤認為良伴直至身敗名裂而後已良可悲也豈知相反適相成苦口多良藥忠言恆逆耳順時易傾覆逆境多振拔有作為人當開放見地以善處之鄉人之善者少不善者多善人在俗亦難自立且豪傑智過萬人者謂之英智過千人者謂之俊智過百人者謂之豪智過十人者謂之傑錚錚金聲後漢劉盆子傳光武曰卿所謂鐵中錚錚者言不同尋常也不甚修形迹多易指摘容易惹人非議也故善事常易敗而善人常得謗惟仁人長者匡直而輔翼之匡正之也翼覆護也其功德最宏何謂勸人為善生為人類孰無良心世路役役有所求而不止也最易沒溺容易令人失足也凡與人相處當方便提撕多方指示使之警悟開其迷惑譬猶長夜大夢而令之一覺譬猶久陷煩惱而拔之清涼為惠最溥周遍而廣大也韓愈云解見舊序一時勸人以口百世勸人以書較之與人為善雖有形迹然對證發藥時有奇效不可廢也以口勸而對證發藥奇效立致而所及者近以書勸而造福無量所及者廣宜兼圖之失言失人可與言而不與之言失人不可與言而與之言失言當反自返自責吾智智者不失人亦不失言何謂救人危急患難顛沛顛遭大不幸基業傾覆沛遇禍亂時流離失所人所時有言或者有時不免也惟夙福深厚之人則免至心修德之人力可回天而亦免此或減輕其罪報偶一遇之當痌癏之在身瘡潰曰痌回旋痛苦曰癏速為解救或以一言伸其屈抑屈冤屈抑壓抑或以多方濟其顛連不幸之遭遇連續而至曰顛連崔子曰惠不在大赴人之急可也蓋仁人之言哉何謂興興起建建立大利小而一鄉之內大而一邑之中凡有利益指公衆所受之利益言最宜興建或開渠挖蓄水之處備旱時灌溉導水因勢利導以泄多水或築隄防患低處易受外水浸灌之害宜堅築長隄以防護或修橋梁以便行旅或施茶飯以濟飢渴隨緣勸導隨見隨聞協同勸導堅人施心成此美舉協力興修富者慷慨出資貧者義務工作曰協力則出實力相助不但向人口勸而已勿避嫌疑竭誠盡力坦白無私做去實功隨顯疑謗自消勿辭勞怨任勞任怨是成事不二訣何謂捨財作福釋門釋佛姓也又解釋開演宏教立理曰釋門通入之義差別之義有緣者通入之故云門差別於他教故云門佛教亦稱為釋教佛門亦稱為釋門萬行行有行止行持二意以布施為先所謂布施者只是捨之一字耳達者內捨六根眼耳鼻舌身意外捨六塵色聲香味觸法觸即膚際所接觸之軟硬澀滑冷暖等種種觸塵法即意識上發生一切愛憎取捨豫計追憶以迄一切游思妄念等種種法塵性海不波意地乾淨便是肉身菩薩一切所有無不捨者苟非能然先從財上布施世人以衣食為命故財為最重吾從而捨之三寸氣在千般用一旦無常萬事休與其蓄積多金以禍子孫何如乘我一息尚存時暢所欲為散施所有於利羣事業上廣積陰德之為愈乎內以破吾之慳慳吝乃貧乏之因斂財實叢怨之府外以濟人之急始而勉強終則泰然心安理得也最可以蕩滌私情洗滌心中積垢祛除執吝醫治鄙吝毛病何謂護持正法即佛法法者萬世生靈之眼目也不有正法何以參贊天地功參造化何以裁成萬物陶鑄羣倫何以脫塵離縛轉迷成覺何以經世舉足為法吐辭為經澄清宇宙澤被蒼生此經世聖賢事也出世智德兼備人天推轂說法度生令出輪回此出世聖賢事也故凡見聖賢廟貌法像經書典籍皆當敬重謗法慢法罪孽之相奉法敬法福德之相而修修治飭整理之至於舉揚正法上報佛恩佛法以教理行果四者為體善度生死苦善滅邪倒見化火獄為蓮池破幽途以慧炬消多生之積障接萬類於慈航如昔阿難承佛慈愍反復宣說常住真性妙明元覺含裹十方一時大徹大悟說偈讚揚妙湛總持不動尊首楞嚴王世希有銷我億劫顛倒想不歷僧祇獲法身願今得果成寶王還度如是恆沙衆將此深心奉塵剎是則名為報佛恩宏揚正法普利有情廣行佛事即報佛恩先覺後覺皆當奮起以圖之尤當勉勵何謂敬重尊長家之父兄國之君長與凡年高德高位高識高者皆當加意奉事在家而奉侍父母使深愛婉柔順容柔聲下氣習以成性便是和氣格天感動天心之本出而事君君行政首長也行一事謂君不知而自恣也驕橫放縱意刑一人毋謂君不知而作威也嚴刑威逼使堂下不得盡其情辭也事君如天古人格論法言也此等處最關陰德試看忠孝之家子孫未有不綿遠發達久遠而昌盛者切須慎之何謂愛惜物命凡人之所以為人者惟此惻隱之心而已見之惻然有動於中而心不忍也求仁者求此積德者積此周禮周公攝政以後所擬之官制書實為古今官鑑孟春之月犧牲毋用牝孟春正月也牛羊豕曰牲色純白曰犧牝畜母也孟子謂君子遠庖廚所以全吾惻隱之心也故前輩有四不食之戒謂聞殺不食見殺不食自養者不食專為我殺者不食蓮池大師之戒殺放生文周懷西居士之萬善先資與近人所輯之好生種福編慈護生編各書均為培養慈心必讀之書學者未能斷肉且當從此戒之一切有生之物各被宿孽所驅而現其種種罪業之相但自覺王天眼觀之一切衆生無非多生多劫以來六親眷屬罪重乃墮之變相無非多生多劫以後成佛作祖業消便升之種子安可以一念貪饞興殺害心而出未來佛祖身血安可以惡習所役起吞嗜心而啖過往六親身肉哉漸漸增進慈心愈長不特殺生當戒蠢動含靈皆為物命一切微命皆有佛性求絲煮繭綢衣一領不知殺害幾千萬飛蛾故智者願布衣終身鋤地殺蟲通常一飯不知耗費農夫幾多汗血不知戕害土中幾多生命仁者念此必有對食傷心不忍下咽者矣念衣食之由來皆殺彼以自活故暴殄之孽暴殄賤視物品狼藉作踐不知愛惜也當與殺生等至於手所誤傷足所誤踐者不知其幾皆當委曲防之古詩云為鼠常留飯憐蛾不點燈何其仁也善行無窮不能殫述殫悉數也由此十事而推廣之則萬德可備矣謙德之效易曰天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙盈驕滿也驕滿故傾覆謙虛中也虛中故受福變變遷也流潤澤也惡不愜意也好歡喜也是故謙之一卦六爻皆吉謙卦係兌卦中第五變卦易多戒慎警惕之辭全經三百八十四爻所綴象辭多悚懼之文惟於內卦二爻外卦五爻多褒許之辭以得中道故也惟謙卦六爻多吉語處世重虛懷若谷之道於此可見而往聖善通天下之情亦概可見矣書曰滿招損謙受益豫屢同諸公應試結伴投考每見寒士將達達成名也必有一段謙光可掬謙抑之人心氣愈收斂光彩愈煥發兩手合取曰掬形容充意辛未計偕舉子赴會試曰計偕我嘉善縣名屬浙江嘉興府同袍凡十人惟丁敬宇賓丁賓號敬宇字禮原嘉善人隆慶進士官南都三十年輕財恤民卒諡清惠年最少極其謙虛豫告費錦坡曰此兄今年必第登科曰及第費曰何以見之豫曰惟謙受福兄看十人中有恂恂信實款款朴厚不敢先人如敬宇者乎有恭敬順承一切順受小心謙畏如敬宇者乎有受侮不答聞謗不辨如敬宇者乎人能如此即天地鬼神猶將佑之豈有不發者及開榜丁果中式丁丑在京與馮開之同處馮夢禎字開之浙江秀水人萬曆會試第一官編修以文章氣節相尚有快雪堂集行世見其虛己斂容大變其幼年之習李霽巖直諒信實益友益者三友友直友諒友多聞時面攻其非但見其平懷順受未嘗有一言相報豫告之曰福有福始禍有禍先此心果謙天必相之兄今年決第矣已而踰時果然趙裕峯光遠山東冠縣人童年舉於鄉久不第其父為嘉善三尹隨之任慕錢明吾而執文見之明吾悉抹其文趙不惟不怒且心服而速改焉明年遂登第壬辰歲豫入覲古人見王曰覲晤夏建所見其人氣虛意下謙光逼人動人歸而告友人曰凡天將發斯人也未發其福先發其慧此慧一發則浮者自實肆者自斂建所溫良若此天啓之矣及開榜果中式江陰張畏巖積學工文有聲藝林馳譽多士間也甲午南京鄉試寓一寺中揭曉出榜曉示無名大罵試官以為瞇目時有一道者在傍微笑張遽移怒道者道者曰相公文必不佳張益怒曰汝不見我文烏何也知不佳道者曰聞作文貴心氣和平今聽公罵詈不平甚矣文安得工張不覺屈服因就而請教焉道者曰中中式也全要命命不該中文雖工無益也須自己做個轉變張曰既是命如何轉變道者曰造命者天立命者我力行善事廣積陰德何福不可求哉張曰我貧士何能為道者曰善事陰功皆由心造常存此心功德無量且如謙虛一節並不費錢你如何不自反還責自己工夫不到而罵試官乎張由此折節自持深服道者語從此力改前非也善日加修德日加厚丁酉夢至一高房得試録一冊中多缺行問旁人曰此今科試録題名録問何多缺名曰科第陰間三年一考較須積德無咎過失者方有名如前所缺皆係舊該中式因新有薄行而去之者也後指一行云汝三年來持身頗慎或當補此幸自愛是科果中一百五名由此觀之舉頭三尺決有神明趨吉避凶斷然由我須使我存心制約束行行為毫不得罪於天地鬼神而虛心屈己使天地鬼神時時憐我方有受福之基彼氣盈者必非遠器縱發亦無受用稍有識見之士必不忍自狹其量而自拒其福也况謙則受教有地而取善無窮尤修業者所必不可少者也古語云有志於功名者必得功名有志於富貴者必得富貴人之有志如樹之有根立定此志須念念謙虛塵塵無微不至也方便自然感動天地而造福由我今之求登科第者在昔日科舉時代則云然在現代可作求功名者解初未嘗有真志不過一時意興耳興到則求興闌則止闌衰退也志行薄弱之人決無後望學者當知所勉矣孟子曰王之好樂甚齊其庶幾乎將力求快適之心擴而充之作與民同樂之舉安有國運不大昌者乎豫於科名亦然了凡先生言對於一切求功名者亦望其立志真切擴充善量悉力做去而為福自我造數不能拘之人附録俞淨意公遇竈神記明嘉靖時江西俞公諱都諱避諱於尊者名禁出諸口也春秋為尊者諱為親者諱為賢者諱見公羊傳字良臣多才博學十八歲為諸生已入泮每試必高等年及壯家貧授徒以設館教讀為生涯與同庠生十餘人同年進學諸人結文昌社遵文昌遺訓行事惜字放生戒淫殺口過行之有年前後應試七科皆不中生五子四子病夭其第三子甚聰秀左足底有雙痣夫婦寶之八歲戲於里中遂失去不知所之生四女僅存其一妻以哭兒女故兩目皆盲公潦倒與顛沛同終年貧窘益甚窘巨隕切君上聲窮迫也虎曰山君字從穴從君其困迫之狀可見自反自問無大過此語便是毛病良心上已稍稍覺得有如許小差處在慘膺承當也天罰年四十外每歲臘月終自寫黃疏禱於竈神求其上達如是數年亦無報應至四十七歲時除夕與瞽妻一女夜坐舉室蕭然凄寂狀凄涼相弔愁容相對也忽聞叩門聲公秉燭視之見一角巾皂服之士角巾以巾一方折角裹頭古人隱居之服也皂黑色鬚髮半蒼長揖就座口稱張姓自遠路而歸聞君家愁嘆特來相慰公心異其人執禮甚恭恭敬盡禮也因言生平讀書積行至今功名不遂妻子不全不能保全衣食不繼且以歷焚竈疏為張誦之稱述也張曰豫知君家事久矣君意惡太重專務虛名滿紙怨尤怨恨語也瀆褻慢也陳上帝恐受罰不止此也公大驚曰聞冥冥之中纖至微小也善必録豫誓行善事恪奉規條久矣豈盡屬虛名乎張曰即如君規條中惜字一款君之生徒與知交輩多用書文舊冊糊窗裹物甚至以之拭桌且藉口曰勿污而旋焚之君日日親見略不戒諭一語但遇途間字紙拾歸付火有何益哉社中每月放生君隨班奔逐因人成事倘諸人不舉君亦浮沈而已隨人浮沈毫無堅確意志其實慈悲之念並未動於中也且君家蝦蟹之類亦登於庖彼獨非生命耶若口過一節君語言敏妙談者常傾倒折服也於君君彼時出口心亦自知傷厚幸有此一點良心為今後轉禍為福之機但於朋談慣熟中隨風訕笑訕謗毀也不能禁止舌鋒所及觸怒鬼神陰惡之注不知凡幾乃猶以𥳑厚自居渾厚自許吾誰欺欺天乎邪淫雖無實迹君見人家美子女必熟視之心即搖搖不能遣言邪念不能驅去也但無邪緣相湊耳君自反身當其境能如魯男子乎孔子家語魯人有獨處室者鄰之嫠婦亦獨處一室夜暴風雨至嫠婦室壞趨託焉魯人閉戶不納曰吾聞男女不六十不同居婦人曰子何不如柳下惠然嫗不逮門之女國人不稱其亂魯人曰柳下惠則可吾固不可吾將以吾之不可學柳下惠之可乃期於至善而不襲其迹也遂謂終身無邪色可對天地鬼神真妄也此君之規條誓行者尚然如此何况其餘君連歲所焚之疏悉陳於天上帝命日游使者察君善惡數年無一善行可記但於私居獨處中見君之貪念淫念嫉妬念褊急念高己卑人念憶往期來念恩讎報復念憧憧於胸憧憧意念紛起也不可紀極無終極時此諸種種意惡身口意三惡業意惡為最大身口二業都從意惡做出固結於中神注已多天罰日甚君逃禍不暇何由祈求也福哉公驚愕驟受震驚惶悚非常恐懼伏地流涕曰君既通幽事定係尊神願求救度張曰君讀書明理亦知慕善為樂當其聞一善言時不勝激勸異常激勵並以勸勉見一善事時不勝鼓舞異常興高采烈但旋過旋忘旋轉也言不多時便忘却也信根原自不深恆常也性是以不固故生平善言善行都是敷衍浮沈辦事不切實故隨俗浮沈何嘗有一事著實且滿腔猶言滿腹也意惡起伏纏綿如波浪起伏不已狀如亂絲固結不解狀猶欲責天美報如種遍地荊棘癡癡然望收嘉禾豈不謬謬差也哉君從今後凡有貪淫客氣妄想諸雜念先具猛力一切屏除屏嚴拒也收拾乾乾淨淨一箇念頭只理會善一邊去若有力量能行的善事不圖報不務名不論大小難易實實落落切切實實直捷痛快耐心行去若力量不能行的亦要勤勤懇懇使此善意圓滿第一要忍耐心第二要永遠心切不可自惰不得存放縱懈怠心切不可自欺不得作瞞心昧己事久久行之自有不測效驗君家事我甚見虔恭敬潔特以此意報之至誠可以感動天地速速勉持勉力修持可回天意言畢即進公內室公即起隨之至竈下忽不見方悟為司命之神竈神為東廚司命言掌人間善惡之事酉陽雜俎曰竈神名隗又姓張名單常以月晦日上天白人罪狀淮南子萬畢術曰竈神晦日歸天白人罪濟陽破衲曰在生正直死後成神天下竈神為數甚多宛同保正又曰作善者死後多升造孽者死後常墮此係實事並非寓言惟若天若神自佛家究竟法言之仍在凡夫地位仍未脫輪回福報盡時仍須墮落因焚香叩謝即於次日元旦拜禱禱告天地誓古人對天立誓折矢立言故字義從折從言改前非實行善事自別其號曰淨意道人志記也誓除諸妄也初行之日雜念紛乘雜念紛起宛如乘隙而入非疑則惰忽忽時日依舊浮沈此既醒復眠之人所由永劫沈淪也可不懼哉因於家堂所供觀音大士前叩頭流血志氣昏惰原為罪孽之相能早覺察痛自責備至尋聲救苦之大菩薩前矢誠叩禱以求冥佑而期自拔敬發誓願願善念永純善力精進倘有絲毫自寬永墮地獄每日清晨虔誦大慈大悲尊號一百聲以祈求也陰相暗助也從此一言一動一念一時皆如鬼神在旁不敢欺欺心肆放縱凡一切有濟於人有利於物物包括一切含靈負氣者言者不論事之巨大也細身之忙閒人之知不知行善於人所不知之地方為真善力之繼不繼止問事之應為不應為不問力之能繼不能繼精誠所至金石為開事無有不辦者皆歡喜行持委曲成就而後止隨緣方便廣植立也陰功且以敦倫倫歷萬劫不變之常道也倫有五一夫婦二父子三兄弟四朋友五君臣敦者以渾厚自勉不敢稍作薄情之舉也勤學守謙忍辱與夫因果報應之言逢人化導惟日不足不厭不倦每月晦日即計一月所行所言者就竈神處為疏狀辭以告之持之既熟動即萬善相隨靜則一念不起如是三年千日之功年五十歲乃萬曆二年甲戌會試張江陵為首輔前代宰相之職輟闈後舊制試院曰闈鄉試曰秋闈會試曰春闈輟闈會試事竣也訪於同鄉為子擇師人交口薦公羣相推許遂聘赴京師以幣帛禮賢士而徵之曰聘王城曰京京大也王城大於郡縣諸城也師衆也王城中在住者至衆也公挈眷以行挈攜帶眷眷屬張敬公德品為援例入國學使為國學生與生員同萬曆四年丙子附京鄉試遂登科次年中進士一日謁進見也內監王宮中之職唐置內侍監以宦者任其官世遂稱宦官為內監帝制廢後此役隨之而廢楊公楊令五子出拜皆其覓諸四方為己嗣嗣續作己之後人也以娛老者娛尋樂也內一子年十六公若熟認識也其貌問其籍籍貫即産出地曰江右人長江以西之地今人稱江西為江右小時誤入糧船猶依稀髣佛也記姓氏閭里里所居地也五家為鄰五鄰為里閭里門也公甚訝之非常疑怪也命脫左足雙痣宛然公大呼曰是我兒也楊亦驚愕即送其子隨公還寓公奔捷走也告夫人夫人撫子大慟撫手按也慟過於悲痛也血淚迸流涌出也子亦啼出聲哭也捧母之面而舐其目其母雙目復明改過遷善之報如是公悲喜交集遂不願為官辭江陵回籍張高其義厚贈而還公居鄉為善益力其子娶婦連生七子皆育悉嗣承繼也書香焉書香讀書成名也公手書遇竈神并實行改過事以訓子孫身享康安健也壽八十八歲人皆以為實行善事回天挽回定數之意之報云同里後學羅禎記袁了凡居士傳彭紹升撰袁了凡先生名黃字坤儀江南吳江人了凡之先贅以壻作子曰贅嘉善殳氏遂補嘉善縣學生隆慶四年舉於鄉萬曆十四年成進上授寶坻知縣後七年擢升拔也兵部職方司主事會朝鮮即與我國東三省東邊接近之高麗國被倭難倭音渦東海島寇也來乞師經略官名掌一路兵民之事權任甚重在總督之上宋應昌奏了凡軍前贊畫猶今之參謀也兼督朝鮮兵提督舊官制官名清代於重要省分設提督統轄全省水陸各軍為武職最高之官猶今之督軍也李如松以封貢紿倭紿音殆欺詐也倭信之不設備如松遂襲破倭於平壤乘人不備而掩取之曰襲平壤朝鮮安南道之首邑面江背山形勢險要了凡面折如松當面折服直言無隱不應行詭詐也道虧損國體義正辭嚴而如松麾下部下兵士也又殺平民為首功了凡爭之強據理力爭剛正不阿也如松怒獨引兵而東倭襲了凡了凡擊却之攻退也而如松軍果敗思脫罪更以十罪劾了凡劾彈章考核罪狀奏請懲處也而了凡旋以拾遺被議被忌者誣陷也欲加之罪何患無辭罷職歸居常善行益切年七十四終熹宗天啓廟號朝追敘征倭功贈尚寶司少卿了凡自從也為諸生好學問通古今之務象緯律算兵政河渠之說靡不曉練先生博學尚奇凡河洛理數律呂水利兵備旁及勾股堪輿星命之學無不精密研求富有心得有兩行齊集曆法新書皇都水利評注八代文宗羣書備考手批綱鑑行世其在寶坻孜孜求利民縣數數入聲音朔纍遇也被潦潦音老水患也了凡乃濬開鑿也三汊河築隄岸也以禦抵當也之寶坻屬於直隸之京兆南臨渤海西近白河為北方易受水患之地又令民沿海岸植柳海水挾沙上遇柳而淤停積也久之成隄治溝塍界水之田塍也課督策也耕種曠荒廢也土日闢開墾也省諸徭役省減少或免除也省徭役使民從事於義務工作也以便民家不富而好施居常誦持經咒習禪觀寂坐內照止念去妄也日有課程日有常課至誠無間公私遽匆遽冗煩冗未嘗暫輟輟廢止也著作也戒子文四篇行於世夫人賢常助之施亦自記功行不能書作字也以鵝翎莖鵝毛管也漬硃逐日標記也曆本或見了凡立功少輒每也顰蹙皺眉蹙頞嘗為子製冬襖將買花絮冬襖用棉胎也了凡曰絲綿輕暖家中自有何必買絮夫人曰絲貴花賤我欲以貴易賤多製絮衣以衣施衣與人也凍者耳了凡喜曰若如是不患此子無祿福分也矣子儼後亦成進士終高要屬廣東粵海道知縣其子初名天啓逮天啓建元遂避改為儼附注彭紹升江蘇長洲人字允初號尺木又號知歸子法名際清乾隆間進士工古文初慕賈誼之為人思赫然樹功烈後讀儒先正書尤喜陸宋陸象山王明王陽明之學嘗與吳縣汪大紳瑞金羅有高等游遍閲藏經居深山習靜素食持戒甚嚴欲以徹儒佛之樊有一行居集居士傳無量壽經起信論淨土聖賢録善女人傳等刊行於世遠近傳誦雲谷大師傳於大藏憨山大師夢遊集卷三十中鈔出憨山釋德清撰師諱法會別號雲谷嘉善胥山浙江嘉興縣西南十三里相傳伍子胥伐越經此因名懷氏子生於弘治庚申明帝孝宗十三年幼志出世即出家也投邑大雲寺某公為師初習瑜伽此瑜伽指應赴佛事言譯云相應一與境相應二與行相應三與理相應四與果相應五與機相應顯宗多取理相應義瑜伽唯識是也密教取行相應義瑜伽三密是也師每思曰出家以生死大事為切了生死事何以碌碌衣食計為年十九即決志參方參求妙旨也禪門集衆坐禪窮究本有謂之參又住持上堂說法令人參究亦曰參故有早參晚參小參等石頭和尚云謹白參玄人光陰莫虛度尋未幾也登壇受具受比丘具足戒也戒能止惡防非如城能禦敵拒寇敵寇不侵則人民安樂惡非不萌則定慧圓明故持戒為急務聞天台小止觀法門天台宗方便修習禪定法金陵版小止觀六妙法門記載甚詳不備引專精修習法舟濟禪師續徑山之道徑山在杭州臨安府為震旦五山之一有興聖萬壽禪寺首駐錫於此者為道欽禪師宋徑山大慧杲禪師為宗門名宿有語録三十卷敕入大藏禪師有警語云但只存心一處無有不得者時節因緣到來自然觸著磕著噴地醒去又云但自時時提撕妄念起時亦不必將心止遏只看箇話頭行也提撕坐也提撕提撕來提撕去沒滋味那時便是好處不得放捨忽然心花發明照十方剎便能於一毛端現寶王剎坐微塵裏轉大法輪掩關於郡之天寧天寧寺名掩關杜絶外緣尅期進修一七二七三七乃至七七一月二月三月六月乃至永年師往參叩呈其所修舟曰止觀之要止以攝心使其不散觀以照心使其不昏止觀雙修三昧易成不依身心氣息內外脫然無住無著心空法空此是上乘工夫子之所修流於下乘豈西來的的脈意耶學道必以悟心為主師悲仰請益舟授以念佛審實切實參究話頭直令重下疑情師依教日夜參究寢食俱廢此心不為積習所牽便是大徹大悟之因一日受食食盡亦不自知碗忽墮地猛然有省恍如夢覺復請益舟乃蒙印可弟子所得為師證明曰印可稱美許可之意也閲宗鏡録凡百卷宋智覺禪師延壽集大悟唯心之旨從此一切經教及諸祖公案了然如睹家中故物於是韜晦韜光晦迹叢林多數比丘和合住於一處如樹木之叢集為林也又禪庭號為功德叢林智慧神通四無量等是其功德衆德積聚說為叢林陸沈賤役人中隱者譬之無水而沈親操勞役以資磨練等視一切貴賤見泯一日閲鐔津集宋釋契嵩撰廣西藤縣鐔津人故集以得名亦名著也見明教大師護法深心初禮觀音大士日夜稱名十萬聲師願效其行遂頂禮觀音大士像通宵不寐不合眼也睡者陰氣覆蓋心光亦屬罪孽之相精進勇猛而至不寐實得道之徵禮拜經行終身不懈時江南佛法禪道絶然無聞師初至金陵江蘇省城寓天界毗盧閣下行道見者稱異魏國先王聞之乃請於西園叢桂庵供養獻佛飯僧都名供養師住此入定三日夜心定於一處使身口意三業止息曰入定居無何住此未幾豫憨山自稱先太師祖西林翁掌僧録兼報恩寺名住持寺僧之主乃方丈和尚也往謁師即請住本寺之三藏殿師危坐一龕禪龕絶無將迎灑然無著足不越閫閫門限也者三年人無知者偶有權貴人遊至見師端坐以為無禮謾侮也辱之師拽杖至攝山棲霞山在鎮江丹徒境內棲霞乃梁朝開山武帝鑿千佛嶺纍朝賜供供養贍充足也田地道場荒廢殿堂為虎狼巢此師至時情狀師愛其幽深遂誅茅芟除茅草結庵其地於千佛嶺下影不出山時有盜侵犯也師竊去所有夜行至天明尚不離庵人獲之送至師師食去聲給與食物也以飲食盡與所有持去由是聞者感化太宰五臺陸公初仕為祠部官名掌禮制主政訪古道場誦經禮拜之所曰道場偶遊棲霞見師氣宇不凡氣度相貌超出尋常雅重之特為推重信宿一宿為舍再宿為信語出左傳山中欲重興其寺請師為住持師堅辭舉嵩山善公以應命善公盡復寺故業斥逐也豪民占據第宅為方丈住持住處曰方丈取維摩石室四方各一丈之義非如儒師席間函丈也建禪堂開講席納收留也四來四方來者江南揚子江以南也叢林肇於此師之力也道場既開往來者衆師乃移居於山之最深處曰天開巖弔影寂處也如初一時宰官居士因陸公開導多知有禪道聞師之風往往造謁求見也凡參請者一見師即問曰日用事如何不論貴賤僧俗入室必擲蒲團於地令其端坐返觀自己本來面目甚至終日竟夜無一語臨別必叮嚀曰無空過日再見必問別後用心功夫難易若何故荒唐者茫無以應以慈愈切而嚴益重雖無門庭設施見者望崖山邊也不寒而栗悚懼也然師一以等心相攝引進也從來接人軟語低聲一味平懷未嘗有辭色士大夫歸依奉以為師者日益衆即不能入山有請見者師以化導為心亦就見歲一往來城中必主於回光寺主者客之依託言寄寓於是寺也每至則在家二衆歸之如繞華座師一視如幻化人四大本來假合能識得破自爾超情離見曾無一念分別心故親近者如嬰兒之傍慈母師出城多主於普德臞鶴悅公實稟其教先太師翁每延入丈室動經旬月豫童子時即親近執執役侍侍奉辱師器之以為可造就也訓誨不倦豫年十九有不欲出家意師知之問曰汝何背初心耶豫曰第但也厭其俗耳師曰汝知厭俗何不學高僧古之高僧天子帝制時代國王尊稱不以臣禮待之父母不以子禮畜育也之天天帝龍龍神八部之一恭敬不以為喜當取傳燈録凡三十卷宋沙門道原所編高僧傳凡十四卷梁慧皎撰續高僧傳四十卷唐道宣撰宋高僧傳三十卷宋贊寧等撰明高僧傳六卷明如惺撰讀之則知之矣豫即簡檢閲書笥書箱得中峯廣録一部元天目山普應國師所撰凡三十卷師號中峯浙江錢塘人持白師師曰熟味此即知僧之為貴也豫由是決志剃剃除鬚髮染屏除華飾著壞色衣實蒙師之開發乃嘉靖甲子歲也丙寅冬師愍悲也禪道絶響衰敗極也乃集五十三人結坐禪期於天界結道場之寺名師力拔豫入衆同參指示向上一路宗門極處盤山法語曰向上一路千聖不傳教以念佛審實話頭乃先念佛數聲然後審察這念佛的人畢竟是誰是時始知有宗門事禪宗自稱曰宗門稱餘宗曰教門向無文字言說處窮究本來面目曰宗門事比南都諸剎從禪者四五人耳師垂老臨暮年時悲心益切雖最小沙彌息惡行慈曰沙彌七歲至十三名驅烏沙彌小兒出家阿難不度佛言能驅食上烏者聽度一以慈眼視之遇之以禮凡動靜威儀行住坐臥為四威儀無不耳提面命當面吩咐又提其耳懇切教導也循循善誘次第誘導見者人人以為親己然護法心深不輕初學初發心人不慢毀戒破戒比丘諸山僧多不律不知遵守戒規凡有干犯也法紀者師一聞之不待求而往救必懇當事謂佛法付囑王臣為外護善知識能說法示導良道伴能挾持輔助名為內護王臣士庶能摧邪輔正供給所需以故名為外護也惟在仰體佛心辱僧即辱佛也聞者莫不改容必至釋然解脫而後已然竟罔聞於人者罔無也故聽者亦未嘗以多事為煩煩厭煩也久久皆知出於無緣慈也無緣慈即諸佛所行之慈惠也蓋諸佛之心不住有為無為性中不住過去現在未來世中知諸緣不實顛倒虛妄故心無所緣蓋雖熾然行慈不見受慈者之為誰不見行慈者之有己并不知所行者之為慈惟知行所無事而已了凡袁公未第時參師於山中相對默坐三日夜師示之以唯心立命之旨一切唯心造公奉教事詳省身録由是師道日益重隆慶辛未豫辭師北遊師誡之曰古人行腳行腳為禪僧遍參知識之事祖庭事苑八曰行腳者謂遠離鄉曲行腳天下脫情捐纍尋訪師友求法證悟也所以學無常師遍歷為尚單為求明己躬下事即參究自家本來面目找出自性天真佛爾當思他日將何以見父母師友慎毋虛費草鞋錢也先達云踏破草鞋無覓處得來全不費工夫豫涕泣禮別壬申春嘉禾縣名屬湖南衡陽道浙江嘉興縣亦名此吏部尚書吏部為舊官制六部之一掌中外文職銓敘勳階黜陟之政清宣統時始廢以其職掌併入內閣默泉吳公刑部尚書刑部亦為舊官制六部之一掌刑法獄訟之事清光緒時改官制更名法部即今之司法部旦泉鄭公平湖縣名浙江嘉興府屬太僕舊官制官名為九卿之一掌輿馬及畜牧之事清光緒間改革官制併入陸軍部五臺陸公與弟雲臺同請師故山諸公時時入室問道每見必炷香請益執弟子禮達觀可禪師常同尚書平泉陸公中書舊官制掌宮禁中書記並掌機密清宣統時改內閣官制中書始廢思庵徐公謁參見也師叩問也華嚴宗旨師為發揮四法界圓融之妙四法界一事法界二理法界三理事無礙法界四事事無礙法界清涼新經疏云統唯一真法界謂總該萬有即是一心然心融萬有便成四種法界一事法界界是分義一一差別有分齊故二理法界是性義無盡事法同一性故三理事無礙法界具性分義性分無礙故四事事無礙法界一切分齊事法一一如性融通重重無盡故也皆歎未曾有師尋常示人特揭唯心淨土法門生平任緣未嘗樹立門庭諸山但有禪講道場必請坐方丈至則舉揚百丈規矩百丈規矩乃禪門之模範僧人之典型凡所作為皆有規矩係唐百丈山懷海禪師所立故其書名為百丈清規善知識振興佛法先須由此而始務明先德古有德之人也典型規範也不少稍稍也假借任便居恆安重寡言出語如空谷音洪暢定力攝持住山清修四十餘年如一日脅身左右兩膀曰脅不至席常危坐也終身禮誦未嘗輟至誠無閒一夕當江南禪道草昧之時風氣初開出入多口之地始終無議之者其操行可知已師居鄉三載所蒙化者以千萬計一夜四鄉之人見師庵中大火發及明天明趨視速往探望師已寂然而逝矣萬曆三年乙亥正月初五日也師生於弘治庚申世壽七十有五僧臘五十剃染以後所歷春秋弟子真印等茶毗火化葬於寺右豫自離師遍歷諸方所參知識有道者通稱未見操履平實真慈安詳之若師者每一興想師之音聲色相昭然心目以感法乳佛法養慧命故曰法乳之深故至老而不能忘也師之發跡入道因緣蓋常親蒙開示第末後一著歸宗處未知所歸前丁巳歲東遊赴沈定凡居士齊禮師塔於棲真乃募建塔亭置供贍田以備永久供養少盡一念見了凡先生銘未悉未詳盡也乃概述見聞行履為之傳以示來者師為中興禪道之祖惜機語逗機法語失録無以發揚祕妙耳附注憨山大師法名德清明高僧安徽全椒蔡氏子年十二祝髮於金陵古長干寺長入五臺山一名清涼山潛修密證後於牢山曹溪大宏法化所著楞嚴楞伽等注數十種唯夢遊全集五十五卷性相通說一卷莊子內篇注四卷入藏流通周安士先生曰立命之說發於孟子而能身體力行歷歷有驗者則了凡先生一人而已然了凡先生之得以改弦易轍深信不疑行之勇決者又在雲谷禪師一人誰謂空門中破常見有見參究我空法空有為空無為空等空相之法門也必不能發明孔孟之淵微乎淵微精深之義世俗見人力行善事便從而譏之曰作善須無心若一執著便生望報之想此種議論未嘗不高明然而阻人勇往之志多矣農夫終歲勤動而曰爾無望收穫士子十年辛苦而曰汝勿想功名彼能欣然從之乎重刻了凡四訓跋袁了凡先生誡子文四篇乃奉行感應篇功過格之骨髓其首曰立命之學蓋數雖前定命可轉移勉人奮發毋甘暴棄不受善言曰自暴不能有為曰自棄故首之以立命先開其端緒凡人之不肯遷善回心向善者皆自以為無過也夫不止惡而行善如注水於漏器但見其損不見其增遂以為無效者乃自誤也故先曰諸惡莫作次曰衆善奉行若諸惡仍作衆善奉行則剛剛扯直若諸惡仍作數善略行則自然見禍不見福矣故其二曰改過之法夫改過乃立命之下手第一著工夫也世人未嘗無起信行善者而往往局拘也於常見不合古人者多故其三曰積善之方積善一篇論行善有真假端曲陰陽是非偏正半滿大小難易之辨可謂推闡盡致矣闡昌善切層層開示更無剩義故積善篇乃立命之正軌也猶言必由之路也夫初學行善如貧子驟穿華服不免有驕矜之意驕自滿意矜誇張意貢高我慢裾傲無禮薄視一切錙銖天下錙銖輕微也六銖曰錙合二十四銖成一兩錙銖天下猶言目空一世也滿招損謙受益故終之以謙德之效夫謙虛則為善惟日不足故謙德篇乃立命之克保有終也文雖四大段其實一篇也從前善本如慈溪縣名屬浙江寧波府葉思敬之省心集東魯山東三槐堂王氏重刊陰騭文注證卷末附梓文皆全刊四訓逮及也後坊書坊刻善書不達不明白也立言本旨本意也專刻立命一篇又復刪節其原文貽傳也誤後學非淺鮮少也也公此文如精金美玉為明代巨文非僅泛常通常勸世文可比茲敬重録付梓附録俞淨意公遇竈神記因是篇攻治意惡抉出世人通病處詳四訓之所未詳同為有功於人心世道曠古希有之至文故是篇緊接四訓之後次附彭二林先生所撰之了凡居士傳又次附憨山大師所撰之雲谷禪師傳並加以不厭求詳之注釋更於一切警策處綴以圈點為海內外閲者作快讀之一助焉尤惜陰謹撰
