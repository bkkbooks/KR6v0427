front:
  text: 了凡四訓序釋印光撰聖賢之道唯誠與明聖狂之分在乎一念聖罔念逐妄也則作狂狂克念自制也則作聖其操操守也縱放縱也得失之象喻如逆水行舟不進則退不可不勉力操持而稍生縱任也須知誠之一字乃聖凡同具一如亙古不變之謂如不二之真心明之一字乃存養省察從凡至聖之達道然在凡夫地普通人所處庸常之地位日用之間萬境交集一不覺察自己偶失檢點也難免種種違理情想瞥爾而生貪瞋癡妄等邪念忽然發動也此想既生則真心遂受錮蔽如金生鏽如鏡蒙塵一片天真遂為人欲所蔽而凡所作為咸失其中正矣既偏且邪入於小人無忌憚之一路若不加一番切實工夫克除淨盡則愈趨愈下莫知底極言若不及早省察改過自新則積過愈多陷溺愈深矣徒具作聖之心言辜負本具之天真永淪沈淪言墮落也下愚之隊可不哀哉然作聖不難在自明其明德明德指在聖不加在凡不減人人本具照曜天地之真心欲明其明德須從格物物物欲格格正繩愆糾繆格其非心之謂致知努力覺照勿任昏散之謂下手倘人欲之物不能極力格除則本有真知決難徹底顯現欲令真知顯現當於日用云為常起覺照不使一切違理情想暫萌於心如此則庶乎處暗室無虧履平地若恐對青天而懼聞雷霆不驚常使其心虛明洞徹如鏡當臺隨境映現但照前境不隨境轉妍媸自彼於我何干來不豫計去不留戀若或違理情想稍有萌動即當嚴以攻治剿除令盡如與賊軍對敵不但不使侵我封疆尚須斬將搴旗剿滅餘黨其制軍之法必須嚴以自治怠荒克己復禮主敬存誠其器仗須用顏子之四勿顏淵善用克己工夫恪守非禮勿視非禮勿聽非禮勿言非禮勿動之聖訓曾子之三省曾子善用返省工夫每日以為謀不忠交友不信傳授不習三者密密在身心上勘驗去蘧伯玉衛大夫春秋時人名瑗字伯玉年二十已始行返省工夫逐日如是日日自檢無日不發現前日之非日復一日年復一年改過遷善常見前非至五十歲時猶追咎四十九年之非之寡過知非加以戰戰兢兢戒慎恐懼狀如臨深淵如履薄冰與之之指私欲即上文所言之違理情想相對嚴自糾察之意則軍威遠振賊黨寒心承上比喻之義此行文上前後照應法也懼罹遭遇也滅種之極戮冀沾安撫之洪恩從茲相率投降歸順至化儘量形容足上語意盡革先心痛除前非意聿遂也有回心轉業之義修厥德指人人本具之明德將不出戶兵不血刃舉寇仇指七情六欲種種妄念也皆為赤子指真心即明德也即叛逆悉作良民正喻夾寫語意同上上行下效一修一切皆修意率土指心地也清寧不動干戈坐致太平矣罪性本空放下便了如上所説則由格物而致知因攻治罪過而覺照由致知而克明明德因覺照而回復本具真心照曜天地之本能誠言至誠無偽天然之性德明言克復已極心光徹現之修德一致即凡成聖矣其或根器陋劣言夙障深重之鈍根衆生未能收效當效趙閲道名抃宋衢州西安人景祐初為殿中侍御史彈劾不避權幸時稱鐵面御史遊宦成都以一琴一鶴自隨為政簡易合郡宴然以太子少保致仕卒諡清獻為人長厚存養功深日間所為事每夜必衣冠露香以告於天晚年學道有得臨終與後人訣別神致不亂安坐而歿有趙清獻集刊行於世日之所為夜必焚香告帝不敢告者即不敢為袁了凡諸惡莫作衆善奉行命自我立福自我求俾造物不能獨擅獨作主張其權受持功過格受持依法修持也功過格一書規定一切善惡行為應得功過數量先賢如周濂溪朱晦菴邵堯夫及韓魏公蘇文忠公俱受持此格信受奉行立功當代馳譽千秋此書流通甚廣坊間易覓即如上海城內邑廟後翼化堂書坊亦有出售書價連運費六分凡舉心動念及所言所行善惡纖悉皆記以期善日增而惡日減初則善惡參雜久則唯善無惡故能轉無福為有福轉不壽為長壽轉無子孫為多子孫現生優入聖賢之域報盡吾人現生無論貧富貴賤智愚榮辱等等無非夙業所驅緣熟斯來報盡便休人身難得易失若不急趁命光未遷謝時勤修善業以自救拔倘一墮落設欲再得人身不知經歷幾何年月矣如之何不懼高登極樂之鄉不為命數所拘不為夙業所縛永謝沈淪苦趣安住寂光聖境非大修行人大解脫人烏能致此到此地位一切世福無與比倫稱之曰極樂豈夸辭哉行為世則言為世法此大聖賢言行自尋常人觀之方以為高不可攀自法門中了義言之如是苦心力行積德纍功尚屬初級工夫彼既丈夫我亦爾何可自輕而退屈彼丈夫我亦丈夫彼能是我豈不能是然則自暴自棄者實等於自殺耳或問格物乃窮盡天下事物之理致知乃推極吾之知識必使一一曉了也何得以人欲為物真知為知克治顯現此指去妄克欲之內功如將鏽鐵打磨而使神彩煥發也為格致乎答曰誠與明德皆約自心之本體而言誠即惟真無妄之性德明德即一真湛然之心體名雖有二體本唯一也知與意心兼約自心之體用而言實則即三而一也格致誠正明此指明明德之明與誠明之明五者皆約間防範也邪存誠返妄歸真而言其檢點省察造詣工夫造詣全神灌注不到不罷意明為總綱格致誠正乃別目耳修身正心誠意致知皆所以明明德也倘自心本有之真知為物欲所蔽則意不誠而心不正矣若能格而除之則是慧風掃蕩障雲盡心月孤圓朗中天矣此聖人示人從泛至切從疏至親之決定次序也若窮盡天下事物之理俾吾心知識悉皆明了方能誠意者則唯博覽羣書遍遊天下之人方能誠意正心以明其明德未能博覽閲歷者縱有純厚天資於誠意正心皆無其分况其下焉者哉有是理乎然不深窮理之士窮乃追尋究竟直窮到底之意與無知無識之人若聞理性多皆高推聖境大人者不失其赤子之心赤子之心即無思無慮點塵不染之心如具此心則亦大人而已矣自處凡愚狂夫欺慢如何有入道因緣多衆自疑竟忘却本來面目不肯奮發勉勵遵循從事若告以過去現在未來三世因果或善或惡各有其報報應通三世現在時期為至暫過去未來時期則甚長藏經中所載因果報應之事往往有經多生多劫而酬償夙債者身口意三所作諸善諸不善業緣熟時至一一自食其報報盡方休衆生障重欲深昧却本明逐妄造孽紛紛擾擾無時無處不在迷境處火坑而不覺遇怨對而不知千秋長夜萬劫沈淪可憐亦可悲已則必畏惡果而斷惡因修善因而冀善果善惡不出身口意三身口意三業簡言之各各都能為十善業及相反之十不善業詳大乘戒律中之十善業道經此經揚州藏經院印行可向各地佛經流通處請閲既知因果自可防護身口洗心滌慮雖在暗室屋漏之中常如面對帝天暗室人目不見之地漏隱處也言君子戒謹恐懼雖處暗室中覺十目所視十手所指常若有多人監視然常存明明在上鑒察不爽意不敢稍萌匪鄙之心匪同非不合理也鄙同醜不榮譽也以自干罪戾也已干犯也戾罪過也含不敢侵犯意故於文從戶從犬此大覺世尊大覺究竟真空實相徹底盡源更無遮障之謂凡夫不覺悟聲聞自覺不覺他菩薩自覺亦覺他但功行未圓滿惟諸佛如來自覺覺他皆圓滿故獨稱之為大覺世尊乃佛之尊號以佛具足萬德為一切世界所尊奉故曰世尊普令一切上中下根根根器含來歷及分等意致知誠意正心修身之大法也然狂者畏其拘束謂為著相言不解脫愚者防己愧怍謂為渺茫此兩等人所持託辭其實皆回護己短之一種解嘲語也除此二種人有誰不信受人惟苦不知愧恥耳知愧便不敢遂過知恥便不敢因循有愧恥心即為其人入道因緣故夢東云夢東禪師為前清乾嘉間法門第一人師本禪門宗匠而救世願廣弘揚淨宗甚力晚年退修直隸懷柔縣紅螺山資福寺蓮風大扇遐邇向化道俗歸心迄今淨因廣植法門中咸推紅螺寺為中國黃河以北第一念佛道場有徹悟禪師語録刊行於世言言金石字字牟尼今日方便攝心之化流布益廣師之宏法功德無有限量矣善談心性者必不棄離於因果過去所造為因現在所受為果現在所造為因未來所受為果苦樂因果皆由自心之所感十方三際一切事相無一不發生於瞥爾妄動之生滅心中亦無不消除於本來清淨之真如心中一毫端上納盡華藏世界事相無量無一而非因果無量因果無一不出之於心性心性不易見即可借因果以見之而深信因果者終必大明夫心性徹悟禪師語録暢論一切衆生受生十界因緣即發軔於念頭動處至論玄義開卷了然此理勢所必然也須知從凡夫地乃至圓證佛果悉不出因果之外有不信因果者皆自棄其善因善果而常造惡因常受惡果經塵點劫劫最長時間也一千六百八十萬年為一小劫二十小劫為一中劫歷第一中劫曰成劫歷第二中劫曰住劫歷第三中劫曰壞劫歷第四中劫曰空劫循環往復多不勝計曰塵劫輪轉惡道衆生以善惡業力輪回六道一天道二人道三阿修羅道四地獄道五餓鬼道六畜生道地獄餓鬼畜生為三惡道末由出離之流也哀哉聖賢千言萬語無非欲人返省克念俾吾心本具之明德不致埋沒親得受用耳但人由不知因果每每肆意縱情縱畢生讀之亦止學其詞章不以希聖希賢為事希希望學步意也因茲當面錯過袁了凡先生訓子四篇文理俱暢豁人心目豁頓然開通也讀之自有欣欣向榮指心地上一片生機亟欲取法之勢洵淑世淑善也言此書具改善世道人心之偉力也良謨也良謨猶言善法也永嘉即浙江溫州周羣錚居士發願流通祈豫為序因撮取僅舉大要也聖賢克己戰勝私欲之謂即孔氏毋意毋必毋固毋我之修省工夫復禮回復恭敬謙抑之道恭敬可謂之為無形之禮服間邪防間邪念使勿踰越範圍防心如防賊之意也存誠存保持勿失之意也之意以塞其責云舊序逸名文有懸提也筆立就馬上成功也傾倒也瀉如瓶出水也而出又復至精至妙者韓文公唐韓愈祭十二郎文十二郎名未詳愈之姪厚謹純明愈目為克家良子及卒愈為文祭之為祭文中千秋絶調選入古文讀本中是也文有久已脫稿日改月更千錘打紅鐵使成器曰錘百鍊至數十年而始為定本者歐陽文忠公宋歐陽修瀧岡阡表瀧音雙瀧岡在江西永豐縣其先人墓地阡墓道也表表揚先德之文從太夫人口中敘述前德意真詞切字字血淚為墓志中至文亦選入古文讀本中是也袁了凡先生以韓韓愈歐歐陽修之筆具韓宋韓琦有將才歷任陝西經略安撫招討使與范仲淹在兵間久名重當時邊人有謠曰軍中有一韓西賊聞之心膽寒軍中有一范西賊聞之驚破膽琦天資忠朴識量英偉決大策安社稷處危疑之際知無不為為無不濟澤及黎民威震國外封魏國公故皆稱韓魏公有安陽集刊行於世范宋范仲淹每感激論天下事奮不顧身一時士大夫受其感化競尚氣節守邊數年號令嚴明愛撫士卒羌人夏人交相畏憚以為此人腹中有數萬甲兵後參知政事裁削幸濫考核嚴厲政海一清為人內剛外和為秀才時以天下為己任嘗以先天下之憂而憂後天下之樂而樂為言生平尤樂善好施置義田以贍族人卒諡文正有丹陽集行世之才將其生平所得著此四訓訓子文四一為立命之學二為改過之法三為積善之方四為謙德之效以數十年修身治性日新月盛之閲歷體驗躬行實踐之意又加數十年字鍛句煉之潤飾鍛煉改造也潤飾修正也故其文精深而博大其理中正而精微改過積善兩篇是正文改過之法發揮有逐層推闡意諸惡莫作積善之方細講衆善奉行立命之學是現身説法略如法華經觀音普門品云應以長者身得度者即現長者身而為説法應以居士身得度者即現居士身而為説法應以宰官身得度者即現宰官身而為説法應以大將軍身得度者即現大將軍身而為説法應以婦女身得度者即現婦女身而為説法應以童男女身得度者即現童男女身而為説法一切境界中有緣得度者皆即現之而為説法現身説法為迎機利導中最方便之一法門一篇大文惟謙者肯反躬內省回光返照自行糾察惟反己能自訟其過訟過有發露攻治意惟自訟庶庶近也改過不吝不吝含豪爽坦白意惟改過斯善事真切惟善真然後可以立命故首從奉母命棄舉業舉業言求取科名之應試文字習醫國人有一學詩書二學醫之諺以故文人學子言治生者多認學醫為捷徑既信孔公數淡然無求孔乃術士逸其名後聽雲谷教轉移定數敘起雲谷禪師事詳見卷尾傳文中今從略此三段公之所謂謙則受教有地也夫以鶴立雞羣之俊秀肯棄青紫如敝屣青紫言功名也敝屣言破草鞋也不獨其品之高而其孝亦可知矣袁母命子語宛如瀧岡阡表我不能教汝此汝父之志也一段語表太夫人之賢於此亦可見矣公之信孔公數非漫含糊也信之必待試其數纖悉皆驗纖悉皆驗言微細事情都應驗也然後深信不疑而遂起讀書之念何等謹慎孔公起數必待其考校名數皆合然後再卜終身使他由目前之不爽爽失也不爽無一差錯也以堅其久遠日後之信何等穩重雲谷教了凡改過曰將向來從前也之相盡情改刷從前習氣如死却從後日新如重生在公聽之已了了而豈常人所能領會心中領受而會通也故於改過之法一篇中反覆痛切言之傳恥畏勇三個方法講事理心三層難易又恐人自謂無過可改將蘧伯玉改過一段以證人必有過自不察耳雲谷教了凡積善曰要從無思無慮處感格感通也言以人心合天心也毋將迎將送也迎接也毋將迎言不隨物而往不先物而動猶言事未至勿逆料既往勿追憶也毋覬覦希冀幸求之意數語在了凡已盡得其旨矣旨深意也仍恐人不窮理窮深究也自謂行持行持含操持弗失奉行弗怠意豈知造孽孽惡業也故於積善之方篇細論深辨之文分三大段段每十小股首敘往事十條以證因果不爽因即因緣也來由也傳燈録有言欲知前世因今生受者是欲知後世果今生作者是果由前因而得之後果也例如種瓜得瓜種豆得豆之意其精微處詳見大藏佛説諸因緣經中及坊間流通之諸因果書中為後人之效法次論精理十六層以防冒昧不辨究竟蒙目而前之意承當擔當也之錯路猶如行人錯走路道也終標十大綱以統領乎萬德公自敘行持由勉強以臻到也自然首誓誓從折從言有古人對天設誓折矢立盟之意三千善歷十餘年而始克告竣完全成就也次許三千只四年而已滿復許萬善止三年而以一事圓之圓滿足也可見初行似不勝其難行之既熟自有得心應手之樂人亦何憚而不為哉憚怕難也自孔公算余至世俗之論矣一段先將立命一結汝之命承上文起下六想六思改過三小段餘波文雖餘尾而言則愈緊意則愈切六退想就宿命上教之謙德此文以謙始以謙終而未明提一謙字故以謙德之效為終篇上半篇寫丁馮趙夏四君謙德讀之如見其人下半敘畏巖不遜遇道者改過一段是一篇小立命道者宛然一雲谷畏巖何幸遇之雲谷攝服也淡然無求自謙之了凡易道者折挫也又直指人過失以折服也有求自滿之畏巖難覷得準打得重責其心氣不平文安得工直探驪珠見莊子千金之珠必在九重之淵驪龍頷下後人喻謂文字之得訣竅者曰探驪得珠使其不得不服既服而請教焉教之轉變積善立命倣佛雲谷與了凡語嗚呼茫茫天下茫茫闊大也何處得逢宗匠見袁宏三國名臣序贊宗匠陶鈞羣才緝熙以宗匠之陶鑄器具喻教育人才也如雲谷道者兩人乎即或遇之亦要受得起這般辣手庶不負善知識一片菩心也善知識善説正法善識人心病因病付藥導人為善導人出苦之良師友也菩心即菩薩心等視一切普濟一切之謂敢不勉哉內思間己之邪順接日日知非一段以起下改過之法一篇文字讚歎雲谷歸結立命本題故四訓不獨為千古名言亦千古妙文也此略言其段落耳至於言外之旨旨意也言外之旨言文中含意甚富望讀者善於領會也字中之意非言可盡細讀之自會細精細會了解了凡四訓目次印光法師序舊序立命之學改過之法積善之方謙德之效附録俞淨意公遇竈神記袁了凡居士傳雲谷大師傳重刻了凡四訓跋袁了凡與陳穎亭書弟田租不多每歲量除三分之一為行義之資先將族人之讀書者與貧而不能婚葬者量助若干次將親友之貧者存而衣食不能自給沒而子孫不能自立者皆薄有所助次又將鄉里貧民每歲放糧以濟其乏次施棺木周給無力津送之家次買魚蝦螺鳥日逐放生放得多欣然暢懷次在叢林等處歲齋僧數千而于修橋補路之屬凡叩門者率不敢虛其所求內思破己之慳外思納人于善凡有利益無不興崇我輩平日刻苦為子孫創業死來皆用不著所可恃以瞑目而釋然無憾者惟此修德行義之事而已大抵人受命于天生來之福有限積來之福無窮
